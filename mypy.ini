# MyPy Configuration for Claw-Service-Hub
# https://mypy.readthedocs.io/en/stable/config_file.html

[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_decorators = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True

# Incremental mode for faster type checking
incremental = True
show_error_codes = True
showcolumnnumbers = True
pretty = True

# Custom type paths
mypy_path = .

# Namespace packages (PEP 420)
namespace_packages = True
explicit_package_bases = True

# Ignore missing imports from third-party packages
ignore_missing_imports = True

# Strict optional (required for full type safety)
strict_optional = True

# Enable all optional error checking
enable_error_code = "truthy-bool"
enable_error_code = "redundant-cast"

[mypy-pytest.*]
ignore_missing_imports = True

[mypy-websockets.*]
ignore_missing_imports = True

[mypy-aiohttp.*]
ignore_missing_imports = True

[mypy-setuptools.*]
ignore_missing_imports = True

[mypy-tests.*]
disallow_untyped_defs = False
check_untyped_defs = False

[pytyped]
# Mark this package as having type annotations
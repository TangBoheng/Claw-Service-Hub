<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景圆 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="toolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGrad)"/>
  
  <!-- 工具箱主体 -->
  <g transform="translate(50, 55)">
    <!-- 箱体 -->
    <rect x="0" y="20" width="100" height="70" rx="8" fill="#1F2937" stroke="#374151" stroke-width="2"/>
    <!-- 箱盖 -->
    <rect x="0" y="5" width="100" height="25" rx="6" fill="#374151"/>
    <!-- 把手 -->
    <rect x="35" y="0" width="30" height="12" rx="3" fill="#4B5563"/>
    
    <!-- 齿轮图标 (工具象征) -->
    <circle cx="30" cy="55" r="12" fill="none" stroke="#9CA3AF" stroke-width="3"/>
    <circle cx="30" cy="55" r="4" fill="#9CA3AF"/>
    <circle cx="70" cy="55" r="12" fill="none" stroke="#9CA3AF" stroke-width="3"/>
    <circle cx="70" cy="55" r="4" fill="#9CA3AF"/>
    
    <!-- 连接线 (服务连接象征) -->
    <path d="M42 55 L58 55" stroke="url(#toolGrad)" stroke-width="4" stroke-linecap="round"/>
    <circle cx="50" cy="55" r="5" fill="url(#toolGrad)"/>
  </g>
  
  <!-- 闪电 (电力/服务激活) -->
  <polygon points="155,35 145,60 155,55 145,80" fill="#F59E0B" stroke="#FFF" stroke-width="2"/>
</svg>